<body class="bg-background font-body text-body text-text-primary antialiased min-h-screen flex flex-col justify-start pb-xxl">

<header class="sticky top-0 z-50 h-[56px] bg-surface border-b border-border flex items-center justify-between px-md w-full">

</div>
<div class="flex items-center space-x-sm">

<span class="material-symbols-outlined text-[20px] font-variation-settings-'FILL'-1">lock</span>
</button>
<button aria-label="More options" class="text-text-secondary w-10 h-10 flex items-center justify-end">
<span class="material-symbols-outlined text-[24px]">more_horiz</span>
</button>
</div>

<!-- MAIN CANVAS -->

<div class="text-[40px] leading-none mb-sm">📔</div>
<h1 class="font-display-mobile text-display-mobile text-text-primary mb-xs outline-none" contenteditable="true">오늘 일기</h1>
<p class="font-caption text-caption text-text-tertiary">마지막 수정 · 방금 전</p>
</div>
<!-- BLOCKS -->
<div class="space-y-md">
<!-- H1 Block -->
<div class="group relative">
<h2 class="text-[22px] font-[700] text-text-primary leading-[1.3] outline-none" contenteditable="true">2026년 5월 12일 화요일</h2>
</div>
<!-- Paragraph Block -->
<div class="group relative">
<p class="font-body text-body text-text-primary leading-[1.7] outline-none" contenteditable="true">오늘은 회사에서 새로운 프로젝트가 시작되었다. 처음엔 부담스러웠지만 동료들과 함께 이야기 나누면서 조금씩 정리가 되어갔다.</p>
</div>
<!-- Callout Block -->
<div class="bg-warning/10 rounded-lg p-3 border border-warning/20 flex gap-sm items-start group relative">
<div class="text-[16px] leading-tight shrink-0">💡</div>
<div class="font-body text-body text-text-primary leading-[1.6] outline-none flex-1" contenteditable="true">
<strong>오늘의 깨달음:</strong> 혼자 끙끙대지 말고 빨리 물어보자.
        </div>
</div>
<!-- H2 Block -->
<div class="group relative mt-lg">
<h3 class="font-h2 text-h2 text-text-primary outline-none" contenteditable="true">감사한 일들</h3>
</div>
<!-- Bullet List Block -->
<ul class="list-disc pl-lg space-y-sm font-body text-body text-text-primary marker:text-text-tertiary group relative outline-none" contenteditable="true">
<li>출근길에 본 벚꽃이 예뻤다</li>
<li>점심에 친구가 카페에서 만나주었다</li>

</div>

<p class="font-body text-body text-text-tertiary outline-none empty:before:content-['글을_입력하거나,_''/''_를_눌러_명령어_사용'] empty:before:text-text-tertiary" contenteditable="true"></p>

<button aria-label="Slash command" class="w-10 h-10 flex items-center justify-center text-text-secondary">
<span class="font-body text-[16px] font-bold">/</span>

</button>
