<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>younest - Mobile Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#944838",
                        "surface-dim": "#e6d7d4",
                        "on-surface": "#221a18",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "warning": "#F4A261",
                        "on-primary-fixed": "#3c0701",
                        "surface-variant": "#efdfdc",
                        "on-tertiary-container": "#005347",
                        "on-primary-container": "#793425",
                        "secondary-container": "#cfbcff",
                        "secondary-fixed": "#e9ddff",
                        "on-secondary-fixed-variant": "#4d3d76",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#763223",
                        "text-secondary": "#6B6B6B",
                        "on-tertiary-fixed-variant": "#005045",
                        "sidebar-bg": "#F5F4F1",
                        "private-accent": "#8B7AB8",
                        "surface-container": "#faeae7",
                        "inverse-primary": "#ffb4a4",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#54433f",
                        "on-background": "#221a18",
                        "border": "#E8E6E1",
                        "tertiary-fixed-dim": "#78d7c3",
                        "tertiary-fixed": "#94f4df",
                        "outline": "#87726e",
                        "tertiary-container": "#69c9b5",
                        "primary-container": "#ff9f8a",
                        "secondary": "#655590",
                        "primary-fixed-dim": "#ffb4a4",
                        "background": "#FAFAF8",
                        "tertiary": "#006b5c",
                        "surface-container-highest": "#efdfdc",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#f5e5e2",
                        "inverse-surface": "#372e2c",
                        "secondary-fixed-dim": "#cfbcff",
                        "on-tertiary-fixed": "#00201b",
                        "on-error": "#ffffff",
                        "primary": "#944838",
                        "inverse-on-surface": "#fdedea",
                        "surface-container-low": "#fff0ee",
                        "surface": "#FFFFFF",
                        "text-primary": "#1A1A1A",
                        "on-secondary-fixed": "#200f48",
                        "on-secondary-container": "#594983",
                        "primary-fixed": "#ffdad3",
                        "surface-bright": "#fff8f6",
                        "success": "#7FB069",
                        "outline-variant": "#dac1bc",
                        "text-tertiary": "#A8A8A8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "container-max": "1440px",
                        "lg": "24px",
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "huge": "64px",
                        "sidebar-width": "240px",
                        "xxl": "48px"
                    },
                    "fontFamily": {
                        "display": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "caption": ["Inter"],
                        "body": ["Inter"],
                        "display-mobile": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "display": ["32px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "h2": ["18px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body": ["14px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-mobile": ["28px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "h1": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Mobile specific utilities */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-text-primary antialiased min-h-screen flex justify-center pb-[80px]">
<!-- Mobile Container (Max width for web viewing) -->
<main class="w-full max-w-[375px] min-h-screen bg-background relative shadow-sm border-x border-border/50">
<!-- TOP BAR -->
<header class="flex justify-between items-center px-md py-md w-full sticky top-0 z-50 bg-surface dark:bg-on-surface-variant shadow-[0_1px_3px_rgba(0,0,0,0.04)] h-[56px]">
<button aria-label="Menu" class="w-[44px] h-[44px] flex items-center justify-start text-text-primary hover:bg-surface-container-low transition-colors duration-200 rounded-full">
<span class="material-symbols-outlined text-[24px]" data-icon="menu">menu</span>
</button>
<h1 class="font-h2 text-h2 text-primary font-bold">younest</h1>
<button aria-label="Search" class="w-[44px] h-[44px] flex items-center justify-end text-text-primary hover:bg-surface-container-low transition-colors duration-200 rounded-full">
<span class="material-symbols-outlined text-[24px]" data-icon="search">search</span>
</button>
</header>
<!-- CONTENT AREA -->
<div class="px-md py-lg flex flex-col gap-lg">
<!-- Greeting -->
<section>
<h2 class="font-display-mobile text-display-mobile mb-xs text-text-primary">안녕하세요, 주연님 👋</h2>
<p class="font-body text-body text-text-secondary">2026년 5월 12일 화요일</p>
</section>
<!-- Quick Compose Widget -->
<section class="bg-surface rounded-[10px] p-md shadow-[0_1px_3px_rgba(0,0,0,0.04)] border border-border">
<h3 class="font-body text-[15px] font-semibold mb-md flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-[18px] fill-icon" data-icon="edit_square">edit_square</span>
                    빠른 작성
                </h3>
<div class="flex gap-sm overflow-x-auto hide-scrollbar pb-xs">
<button class="flex-shrink-0 flex items-center gap-sm px-md py-sm bg-surface border border-primary-container rounded-lg hover:bg-surface-container-low transition-all">
<span class="text-[18px]">📔</span>
<span class="font-body text-body text-text-primary">오늘 일기</span>
</button>
<button class="flex-shrink-0 flex items-center gap-sm px-md py-sm bg-surface border border-border hover:border-primary-container rounded-lg hover:bg-surface-container-low transition-all">
<span class="text-[18px]">🙏</span>
<span class="font-body text-body text-text-primary">기도제목</span>
</button>
<button class="flex-shrink-0 flex items-center gap-sm px-md py-sm bg-surface border border-border hover:border-primary-container rounded-lg hover:bg-surface-container-low transition-all">
<span class="text-[18px]">📝</span>
<span class="font-body text-body text-text-primary">메모</span>
</button>
</div>
</section>
<!-- Favorites Section (Bento Grid Style) -->
<section>
<div class="flex items-center gap-sm mb-md">
<span class="material-symbols-outlined text-warning text-[18px] fill-icon" data-icon="star">star</span>
<h3 class="font-body text-[16px] font-semibold">즐겨찾기</h3>
</div>
<div class="grid grid-cols-2 gap-[12px]">
<!-- Favorite Card 1 -->
<div class="bg-surface rounded-[10px] p-md shadow-[0_1px_3px_rgba(0,0,0,0.04)] border border-border hover:border-primary-container transition-all cursor-pointer flex flex-col justify-between h-[100px]">
<span class="text-[24px]">🌿</span>
<div>
<h4 class="font-body text-[13px] font-semibold text-text-primary mb-[2px] truncate">나의 루틴 관리</h4>
<p class="font-caption text-[10px] text-text-tertiary">방금 전 수정</p>
</div>
</div>
<!-- Favorite Card 2 -->
<div class="bg-surface rounded-[10px] p-md shadow-[0_1px_3px_rgba(0,0,0,0.04)] border border-border hover:border-primary-container transition-all cursor-pointer flex flex-col justify-between h-[100px]">
<span class="text-[24px]">📖</span>
<div>
<h4 class="font-body text-[13px] font-semibold text-text-primary mb-[2px] truncate">독서 노트</h4>
<p class="font-caption text-[10px] text-text-tertiary">2시간 전 수정</p>
</div>
</div>
<!-- Favorite Card 3 -->
<div class="bg-surface rounded-[10px] p-md shadow-[0_1px_3px_rgba(0,0,0,0.04)] border border-border hover:border-primary-container transition-all cursor-pointer flex flex-col justify-between h-[100px]">
<span class="text-[24px] text-private-accent material-symbols-outlined fill-icon">lock</span>
<div>
<h4 class="font-body text-[13px] font-semibold text-text-primary mb-[2px] truncate">비밀 일기장</h4>
<p class="font-caption text-[10px] text-text-tertiary">어제 수정</p>
</div>
</div>
<!-- Favorite Card 4 -->
<div class="bg-surface rounded-[10px] p-md shadow-[0_1px_3px_rgba(0,0,0,0.04)] border border-border hover:border-primary-container transition-all cursor-pointer flex flex-col justify-between h-[100px]">
<span class="text-[24px]">☕️</span>
<div>
<h4 class="font-body text-[13px] font-semibold text-text-primary mb-[2px] truncate">카페 탐방기</h4>
<p class="font-caption text-[10px] text-text-tertiary">3일 전 수정</p>
</div>
</div>
</div>
</section>
<!-- Recent Pages Section -->
<section class="mb-lg">
<div class="flex items-center justify-between mb-md">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-text-secondary text-[18px]" data-icon="history">history</span>
<h3 class="font-body text-[16px] font-semibold">최근 작성</h3>
</div>
</div>
<div class="bg-surface rounded-[10px] shadow-[0_1px_3px_rgba(0,0,0,0.04)] border border-border overflow-hidden">
<ul class="divide-y divide-border">
<li class="p-md hover:bg-surface-container-low transition-colors cursor-pointer flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="text-[20px]">☀️</span>
<span class="font-body text-body text-text-primary">아침 명상 기록</span>
</div>
<span class="font-caption text-caption text-text-tertiary">10분 전</span>
</li>
<li class="p-md hover:bg-surface-container-low transition-colors cursor-pointer flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="text-[20px]">🛒</span>
<span class="font-body text-body text-text-primary">장보기 리스트 (5/12)</span>
</div>
<span class="font-caption text-caption text-text-tertiary">1시간 전</span>
</li>
<li class="p-md hover:bg-surface-container-low transition-colors cursor-pointer flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="text-[20px] text-private-accent material-symbols-outlined">lock</span>
<span class="font-body text-body text-text-primary">개인적인 생각 정리</span>
</div>
<span class="font-caption text-caption text-text-tertiary">5시간 전</span>
</li>
<li class="p-md hover:bg-surface-container-low transition-colors cursor-pointer flex items-center justify-between">
<div class="flex items-center gap-md">
<span class="text-[20px]">💡</span>
<span class="font-body text-body text-text-primary">사이드 프로젝트 아이디어</span>
</div>
<span class="font-caption text-caption text-text-tertiary">어제</span>
</li>
</ul>
</div>
</section>
</div>
<!-- BOTTOM TAB BAR -->
<nav class="fixed bottom-0 w-full max-w-[375px] h-[80px] bg-surface shadow-[0_-2px_10px_rgba(0,0,0,0.05)] flex justify-between items-center px-sm pb-sm z-50 rounded-t-[20px] border-t border-border/50">
<!-- Home (Active) -->
<button class="flex-1 flex flex-col items-center justify-center min-h-[44px] gap-1 group relative">
<span class="material-symbols-outlined text-[24px] text-primary-container fill-icon transition-transform group-active:scale-95" data-icon="home">home</span>
<span class="font-caption text-[10px] font-semibold text-primary-container">Home</span>
</button>
<!-- Search -->
<button class="flex-1 flex flex-col items-center justify-center min-h-[44px] gap-1 group">
<span class="material-symbols-outlined text-[24px] text-text-secondary group-hover:text-text-primary transition-all group-active:scale-95" data-icon="search">search</span>
<span class="font-caption text-[10px] text-text-secondary group-hover:text-text-primary">Search</span>
</button>
<!-- Prominent New Page Action -->
<div class="flex-1 flex justify-center -mt-[30px] relative z-10">
<button aria-label="New Page" class="w-[56px] h-[56px] bg-primary-container text-on-primary rounded-full shadow-[0_10px_20px_rgba(255,159,138,0.3)] flex items-center justify-center hover:bg-inverse-primary transition-all active:scale-95">
<span class="material-symbols-outlined text-[32px] text-surface-container-lowest" data-icon="add">add</span>
</button>
</div>
<!-- Notifications / Nest -->
<button class="flex-1 flex flex-col items-center justify-center min-h-[44px] gap-1 group">
<span class="material-symbols-outlined text-[24px] text-text-secondary group-hover:text-text-primary transition-all group-active:scale-95" data-icon="nest_eco_friendly">SelectionAll</span>
<span class="font-caption text-[10px] text-text-secondary group-hover:text-text-primary">My Nest</span>
</button>
<!-- Settings -->
<button class="flex-1 flex flex-col items-center justify-center min-h-[44px] gap-1 group">
<span class="material-symbols-outlined text-[24px] text-text-secondary group-hover:text-text-primary transition-all group-active:scale-95" data-icon="settings">settings</span>
<span class="font-caption text-[10px] text-text-secondary group-hover:text-text-primary">Settings</span>
</button>
</nav>
</main>
</body></html>
